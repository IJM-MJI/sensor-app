<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sensor Data</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f5f5f5;color:#222;
  max-width:480px;margin:0 auto;
  -webkit-user-select:none;user-select:none;
}
.header{
  background:#fff;text-align:center;padding:14px;
  font-size:20px;font-weight:700;
  border-bottom:1px solid #e0e0e0;
  position:sticky;top:0;z-index:10;
}
.cam-wrap{
  position:relative;width:100%;
  aspect-ratio:1;background:#000;overflow:hidden;
}
.cam-wrap video,.cam-wrap img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.cam-wrap canvas{display:none}
#capturedImg{display:none}
.shutter-area{
  display:flex;justify-content:center;align-items:center;
  padding:16px;background:#111;gap:20px;
}
.shutter{
  width:70px;height:70px;border-radius:50%;
  border:4px solid #fff;background:transparent;
  cursor:pointer;position:relative;
}
.shutter::after{
  content:'';position:absolute;
  top:4px;left:4px;right:4px;bottom:4px;
  border-radius:50%;background:#fff;
  transition:transform .1s;
}
.shutter:active::after{transform:scale(0.85)}
.retake{
  padding:12px 24px;border:none;border-radius:8px;
  background:#444;color:#fff;font-size:15px;cursor:pointer;
}
.card{
  background:#fff;margin:8px 14px;border-radius:12px;
  padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.card h3{font-size:13px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.state-row{display:flex;align-items:center;gap:10px}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.state-name{font-size:20px;font-weight:700}
.conf{font-size:13px;color:#888;margin-left:24px}
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f0f0}
.row:last-child{border-bottom:none}
.lbl{font-size:15px;color:#555}
.val{font-size:17px;font-weight:600}
.status-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.status-dot{width:10px;height:10px;border-radius:50%}
.status-txt{font-size:14px;font-weight:500}
.hidden{display:none!important}
.loading{text-align:center;padding:80px 20px;color:#888}
.spin{
  display:inline-block;width:40px;height:40px;
  border:4px solid #e0e0e0;border-top-color:#2196F3;
  border-radius:50%;animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
.proc-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);display:flex;
  align-items:center;justify-content:center;
  color:#fff;font-size:16px;flex-direction:column;gap:12px;
}
.dbg{font-size:11px;color:#999;padding:4px 14px;word-break:break-all}
.cal-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:#fff;border-bottom:1px solid #e0e0e0;
}
.cal-status{font-size:13px;color:#888}
.cal-status.active{color:#2e7d32;font-weight:600}
.cal-btn{
  padding:8px 16px;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;
}
.cal-btn.calibrate{background:#2196F3;color:#fff}
.cal-btn.clear{background:#eee;color:#666;font-size:12px}
</style>
</head>
<body>

<div class="header">Sensor Data</div>

<div id="loadingScreen" class="loading">
  <div class="spin"></div>
  <p style="margin-top:16px">Loading OpenCV.js...</p>
  <p style="margin-top:8px;font-size:13px;color:#aaa">First load may take 10-20 seconds</p>
</div>

<div id="app" class="hidden">
  <div class="cal-bar">
    <span class="cal-status" id="calStatus">Not calibrated</span>
    <span>
      <button class="cal-btn clear hidden" id="calClearBtn" onclick="clearCal()">Reset</button>
      <button class="cal-btn calibrate" id="calBtn" onclick="startCal()">Calibrate</button>
    </span>
  </div>
  <div class="cam-wrap" id="camWrap">
    <video id="vid" autoplay playsinline muted></video>
    <img id="capturedImg">
    <canvas id="cvs"></canvas>
    <div id="procOverlay" class="proc-overlay hidden">
      <div class="spin"></div>
      <span>Analyzing...</span>
    </div>
  </div>

  <div class="shutter-area">
    <button class="retake hidden" id="retakeBtn" onclick="retake()">Retake</button>
    <button class="shutter" id="shutterBtn" onclick="capture()"></button>
  </div>

  <div id="resArea" class="hidden">
    <div class="card">
      <h3>Current Reading</h3>
      <div class="state-row">
        <div class="dot" id="sDot" style="background:#999"></div>
        <div class="state-name" id="sName">-</div>
      </div>
      <div class="conf" id="sConf"></div>
    </div>
    <div class="card">
      <h3>Concentration</h3>
      <div class="row">
        <span class="lbl">H&#8322;</span>
        <span class="val" id="h2Val">-</span>
      </div>
      <div class="row">
        <span class="lbl">Humidity</span>
        <span class="val" id="rhVal">-</span>
      </div>
    </div>
    <div class="card">
      <div class="status-row">
        <div class="status-dot" id="stDot" style="background:#999"></div>
        <span class="status-txt" id="stTxt">-</span>
      </div>
    </div>
  </div>
  <div class="dbg" id="dbg"></div>
</div>

<script>
// ===== CLASSIFIER v5 (top-chroma percentile + calibration delta) =====
// Default baseline from training data initial state (H2_only videos, h2<0.3%)
var BL_DEFAULT={
  flame_L:129.8,flame_a:119.1,flame_b:159.3,
  drop_L:132.8,drop_a:123.1,drop_b:145.6,
  bg_L:126.9,bg_a:127.4,bg_b:133.5,
  top_L:129.0,top_a:118.1,top_b:163.0
};
var BL=JSON.parse(JSON.stringify(BL_DEFAULT));
var calibrated=false;
var calMode=false;

function loadCal(){
  var s=localStorage.getItem('sensor_cal_v5');
  if(s){
    try{
      var d=JSON.parse(s);
      for(var k in BL_DEFAULT) if(d[k]!=null) BL[k]=d[k];
      calibrated=true;
      updateCalUI();
    }catch(e){}
  }
}

function saveCal(feat){
  for(var k in BL_DEFAULT) if(feat[k]!=null) BL[k]=feat[k];
  calibrated=true;
  localStorage.setItem('sensor_cal_v5',JSON.stringify(BL));
  updateCalUI();
}

function clearCal(){
  BL=JSON.parse(JSON.stringify(BL_DEFAULT));
  calibrated=false;
  localStorage.removeItem('sensor_cal_v5');
  updateCalUI();
}

function updateCalUI(){
  var st=document.getElementById('calStatus');
  var btn=document.getElementById('calBtn');
  var clr=document.getElementById('calClearBtn');
  if(calibrated){
    st.textContent='Calibrated (top_a='+BL.top_a.toFixed(1)+')';
    st.className='cal-status active';
    btn.textContent='Re-calibrate';
    clr.classList.remove('hidden');
  }else{
    st.textContent='Not calibrated';
    st.className='cal-status';
    btn.textContent='Calibrate';
    clr.classList.add('hidden');
  }
}

function startCal(){
  calMode=true;
  document.getElementById('calBtn').textContent='Take photo of initial state';
  document.getElementById('calBtn').style.background='#e65100';
  document.getElementById('dbg').textContent='Calibration: photograph sensor in initial (no gas) state';
}

function h2Score(f){
  // Primary: top_a decrease (strongest H2 signal, Δ=-0.8 to -5.4 at 4% H2)
  var d_top_a=BL.top_a-f.top_a;
  // Secondary: flame_a decrease
  var d_flame_a=BL.flame_a-f.flame_a;
  // Drop should NOT change much with H2 (validation)
  var d_drop_a=BL.drop_a-f.drop_a;
  // Flame-only signal (flame changes, drop doesn't) increases confidence
  var flame_only=Math.max(0,d_flame_a-d_drop_a);
  // Penalty: if shift_b increases, it's H2O not H2
  var shift_b_delta=(f.flame_b-f.bg_b)-(BL.flame_b-BL.bg_b);
  var h2o_penalty=Math.max(0,shift_b_delta)*0.3;
  return d_top_a*2.0+d_flame_a*1.0+flame_only*0.5-h2o_penalty;
}

function h2oScore(f){
  // H2O increases shift_b (flame_b-bg_b) relative to baseline
  var shift_b_now=f.flame_b-f.bg_b;
  var shift_b_bl=BL.flame_b-BL.bg_b;
  var d_shift_b=shift_b_now-shift_b_bl;
  // H2O increases drop_b relative to baseline
  var d_drop_b=f.drop_b-BL.drop_b;
  // H2O may shift flame-drop_a more negative
  var fd_a_now=f.flame_a-f.drop_a;
  var fd_a_bl=BL.flame_a-BL.drop_a;
  var d_fd_a=fd_a_bl-fd_a_now;
  return Math.max(0,d_shift_b)*1.5+Math.max(0,d_drop_b)*1.0+Math.max(0,d_fd_a)*0.8;
}

function doClassify(f){
  var h2S=h2Score(f);
  var h2oS=h2oScore(f);

  var H2_T=1.0, H2O_T=5.0;
  var state;
  if(h2S>=H2_T&&h2oS>=H2O_T) state='H2+RH';
  else if(h2oS>=H2O_T) state='H2O_only';
  else if(h2S>=H2_T) state='H2_only';
  else state='initial';

  // H2 concentration: linear mapping from top_a delta
  var h2=null,rh=null;
  if(state==='H2_only'||state==='H2+RH'){
    var da=BL.top_a-f.top_a;
    if(da<1.0) h2='<1%';
    else if(da<2.0) h2='~1%';
    else if(da<3.5) h2='~2%';
    else if(da<5.0) h2='~3%';
    else h2='~4%';
  }
  if(state==='H2O_only'||state==='H2+RH'){
    var db=f.drop_b-BL.drop_b;
    if(db<2) rh='20-30%';
    else if(db<4) rh='30-50%';
    else if(db<7) rh='50-70%';
    else rh='70-90%';
  }

  var conf;
  if(state==='initial'&&h2S<0.5&&h2oS<2.0) conf='high';
  else if(state==='H2_only'&&h2S>3.0) conf='high';
  else if(state==='H2O_only'&&h2oS>10.0) conf='high';
  else if(state==='H2+RH'&&h2S>2.0&&h2oS>7.0) conf='high';
  else if(state!=='initial') conf='medium';
  else conf='low';

  return{state:state,conf:conf,h2:h2,rh:rh,h2S:Math.round(h2S*10)/10,h2oS:Math.round(h2oS*10)/10};
}

// ===== UI =====
var SC={no_sensor:'#999',initial:'#66bb6a',H2_only:'#ef5350',H2O_only:'#42a5f5','H2+RH':'#ab47bc'};
var SN={no_sensor:'No Sensor Detected',initial:'Initial State',H2_only:'H₂ Detection',H2O_only:'Humidity Detection','H2+RH':'Simultaneous Detection'};
var SM={no_sensor:['Sensor not found','#999'],initial:['Status: Standby','#66bb6a'],H2_only:['Warning: H₂ Detected','#ef5350'],H2O_only:['High Humidity Detected','#42a5f5'],'H2+RH':['H₂ + Humidity Detected','#ab47bc']};

function showResult(r){
  document.getElementById('resArea').classList.remove('hidden');
  document.getElementById('sDot').style.background=SC[r.state]||'#999';
  document.getElementById('sName').textContent=SN[r.state]||r.state;
  var cm={high:'High Confidence',medium:'Medium Confidence',low:'Low Confidence'};
  document.getElementById('sConf').textContent=(cm[r.conf]||'')+' (H2='+r.h2S+' H2O='+r.h2oS+')';
  var h2E=document.getElementById('h2Val');
  if(r.h2){h2E.textContent=r.h2+' (Below LEL)';h2E.style.color='#ef5350';}
  else{h2E.textContent='Not Detected';h2E.style.color='#222';}
  var rhE=document.getElementById('rhVal');
  if(r.rh){rhE.textContent=r.rh;rhE.style.color='#42a5f5';}
  else{rhE.textContent='Normal';rhE.style.color='#222';}
  var msg=SM[r.state]||['Unknown','#999'];
  document.getElementById('stDot').style.background=msg[1];
  document.getElementById('stTxt').textContent=msg[0];
  document.getElementById('stTxt').style.color=msg[1];
}

// ===== CAMERA =====
var vid=document.getElementById('vid');
var cvs=document.getElementById('cvs');
var ctx2d=cvs.getContext('2d');
var captured=false;

function initCam(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}}
  }).then(function(stream){
    vid.srcObject=stream; vid.play();
  }).catch(function(e){
    document.getElementById('dbg').textContent='Camera: '+e.message;
  });
}

function capture(){
  if(captured) return;
  var vw=vid.videoWidth, vh=vid.videoHeight;
  if(!vw||!vh) return;
  cvs.width=vw; cvs.height=vh;
  ctx2d.drawImage(vid,0,0);
  var url=cvs.toDataURL('image/jpeg',0.92);
  document.getElementById('capturedImg').src=url;
  document.getElementById('capturedImg').style.display='block';
  vid.style.display='none';
  captured=true;
  document.getElementById('shutterBtn').classList.add('hidden');
  document.getElementById('retakeBtn').classList.remove('hidden');
  document.getElementById('procOverlay').classList.remove('hidden');
  setTimeout(function(){
    try{
      var r=processFrame();
      if(calMode&&r.state!=='no_sensor'){
        var f=r._raw;
        saveCal(f);
        calMode=false;
        document.getElementById('calBtn').style.background='#2196F3';
        document.getElementById('dbg').textContent='Calibrated! top_a='+f.top_a.toFixed(1)+' flame_a='+f.flame_a.toFixed(1)+' flame_b='+f.flame_b.toFixed(1);
        retake();
        return;
      }
      showResult(r);
      document.getElementById('dbg').textContent=r.dbg||'';
    }catch(e){
      document.getElementById('dbg').textContent='Error: '+e.message+' '+e.stack;
      showResult({state:'no_sensor',conf:'-',h2:null,rh:null,h2S:0,h2oS:0});
    }
    document.getElementById('procOverlay').classList.add('hidden');
  },100);
}

function retake(){
  captured=false;
  document.getElementById('capturedImg').style.display='none';
  vid.style.display='block';
  document.getElementById('shutterBtn').classList.remove('hidden');
  document.getElementById('retakeBtn').classList.add('hidden');
  document.getElementById('resArea').classList.add('hidden');
  document.getElementById('dbg').textContent='';
}

// ===== IMAGE PROCESSING WITH OPENCV.JS =====
function processFrame(){
  var src=cv.imread(cvs);
  // Resize to max 480px for mobile performance
  var maxP=480;
  var sc=Math.max(src.rows,src.cols)>maxP?maxP/Math.max(src.rows,src.cols):1;
  var proc=new cv.Mat();
  if(sc<1) cv.resize(src,proc,new cv.Size(Math.round(src.cols*sc),Math.round(src.rows*sc)));
  else src.copyTo(proc);
  src.delete();
  var result=detectAndClassify(proc);
  proc.delete();
  return result;
}

function detectAndClassify(src){
  var h=src.rows, w=src.cols;

  // 1. Grayscale + HoughCircles for sensor window detection
  var gray=new cv.Mat();
  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
  var blurred=new cv.Mat();
  cv.GaussianBlur(gray,blurred,new cv.Size(9,9),2);
  var minR=Math.round(Math.min(h,w)*0.15);
  var maxR=Math.round(Math.min(h,w)*0.45);
  var circles=new cv.Mat();
  cv.HoughCircles(blurred,circles,cv.HOUGH_GRADIENT,1.2,
    Math.round(Math.min(h,w)/2),80,40,minR,maxR);
  blurred.delete();

  if(circles.cols===0){
    gray.delete(); circles.delete();
    return{state:'no_sensor',conf:'-',h2:null,rh:null,h2S:0,h2oS:0,dbg:'No circular window found'};
  }

  // Best circle by brightness
  var bCx=0,bCy=0,bR=0,bBr=-1;
  for(var i=0;i<circles.cols;i++){
    var cx=Math.round(circles.data32F[i*3]);
    var cy=Math.round(circles.data32F[i*3+1]);
    var r=Math.round(circles.data32F[i*3+2]);
    var ir=Math.round(r*0.5);
    var sum=0,cnt=0;
    for(var dy=-ir;dy<=ir;dy+=3){
      for(var dx=-ir;dx<=ir;dx+=3){
        var px=cx+dx,py=cy+dy;
        if(px>=0&&px<w&&py>=0&&py<h&&dx*dx+dy*dy<=ir*ir){
          sum+=gray.ucharAt(py,px);cnt++;
        }
      }
    }
    var avg=cnt>0?sum/cnt:0;
    if(avg>bBr){bBr=avg;bCx=cx;bCy=cy;bR=r;}
  }
  circles.delete(); gray.delete();

  if(bBr<80)
    return{state:'no_sensor',conf:'-',h2:null,rh:null,h2S:0,h2oS:0,dbg:'Circle too dark'};

  // 2. Convert to LAB
  var bgr=new cv.Mat();
  cv.cvtColor(src,bgr,cv.COLOR_RGBA2BGR);
  var lab=new cv.Mat();
  cv.cvtColor(bgr,lab,cv.COLOR_BGR2Lab);
  bgr.delete();

  var labData=lab.data;
  var cols=lab.cols;
  var innerR=Math.round(bR*0.90);
  var y1=Math.max(0,bCy-innerR),y2=Math.min(h,bCy+innerR);
  var x1=Math.max(0,bCx-innerR),x2=Math.min(w,bCx+innerR);
  var innerR2=innerR*innerR;

  // 3. Top-chroma percentile extraction
  // Collect all pixels inside sensor circle with their LAB and chroma
  var allPx=[];
  for(var yy=y1;yy<y2;yy++){
    for(var xx=x1;xx<x2;xx++){
      var ddx=xx-bCx,ddy=yy-bCy;
      if(ddx*ddx+ddy*ddy>innerR2) continue;
      var ii=(yy*cols+xx)*3;
      var L=labData[ii],a=labData[ii+1],b=labData[ii+2];
      var ao=a-128,bo=b-128;
      var c=Math.sqrt(ao*ao+bo*bo);
      allPx.push({L:L,a:a,b:b,c:c});
    }
  }
  lab.delete();

  if(allPx.length<100){
    return{state:'no_sensor',conf:'-',h2:null,rh:null,h2S:0,h2oS:0,dbg:'Too few pixels ('+allPx.length+')'};
  }

  // Sort by chroma for percentile extraction
  allPx.sort(function(a,b){return a.c-b.c;});
  var n=allPx.length;

  // Top 3% chroma pixels -> top measurement
  var topIdx=Math.floor(n*0.97);
  var topPx=allPx.slice(topIdx);
  var topL=0,topA=0,topB=0;
  for(var i=0;i<topPx.length;i++){topL+=topPx[i].L;topA+=topPx[i].a;topB+=topPx[i].b;}
  topL/=topPx.length;topA/=topPx.length;topB/=topPx.length;

  // Bottom 50% chroma -> background measurement
  var bgIdx=Math.floor(n*0.5);
  var bgPx=allPx.slice(0,bgIdx);
  var bgL=0,bgA=0,bgB=0;
  for(var i=0;i<bgPx.length;i++){bgL+=bgPx[i].L;bgA+=bgPx[i].a;bgB+=bgPx[i].b;}
  bgL/=bgPx.length;bgA/=bgPx.length;bgB/=bgPx.length;

  // Split high-chroma pixels (chroma>15) by b-channel median -> flame (high b) / drop (low b)
  var hiC=[];
  for(var i=0;i<n;i++){if(allPx[i].c>15) hiC.push(allPx[i]);}

  var flameL,flameA,flameB,dropL,dropA,dropB;
  if(hiC.length>20){
    hiC.sort(function(a,b){return a.b-b.b;});
    var mid=Math.floor(hiC.length/2);
    var flamePx=hiC.slice(mid); // higher b = flame
    var dropPx=hiC.slice(0,mid); // lower b = drop
    flameL=0;flameA=0;flameB=0;
    for(var i=0;i<flamePx.length;i++){flameL+=flamePx[i].L;flameA+=flamePx[i].a;flameB+=flamePx[i].b;}
    flameL/=flamePx.length;flameA/=flamePx.length;flameB/=flamePx.length;
    dropL=0;dropA=0;dropB=0;
    for(var i=0;i<dropPx.length;i++){dropL+=dropPx[i].L;dropA+=dropPx[i].a;dropB+=dropPx[i].b;}
    dropL/=dropPx.length;dropA/=dropPx.length;dropB/=dropPx.length;
  }else{
    flameL=topL;flameA=topA;flameB=topB;
    dropL=topL;dropA=topA;dropB=topB;
  }

  // 4. Classify
  var feat={
    flame_L:flameL,flame_a:flameA,flame_b:flameB,
    drop_L:dropL,drop_a:dropA,drop_b:dropB,
    bg_L:bgL,bg_a:bgA,bg_b:bgB,
    top_L:topL,top_a:topA,top_b:topB
  };

  var clf=doClassify(feat);
  clf._raw=feat;
  clf.dbg='top=('+topL.toFixed(0)+','+topA.toFixed(1)+','+topB.toFixed(0)+
    ') fl=('+flameA.toFixed(1)+','+flameB.toFixed(0)+
    ') bg=('+bgA.toFixed(1)+','+bgB.toFixed(0)+
    ') H2='+clf.h2S+' H2O='+clf.h2oS+(calibrated?' [CAL]':' [DEF]');
  return clf;
}

// ===== LOAD OPENCV =====
function onReady(){
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadCal();
  initCam();
}
var scr=document.createElement('script');
scr.src='https://docs.opencv.org/4.9.0/opencv.js';
scr.async=true;
scr.onload=function(){
  if(typeof cv!=='undefined'){
    if(cv.Mat) onReady();
    else if(cv.then) cv.then(function(o){cv=o;onReady();});
    else cv['onRuntimeInitialized']=onReady;
  }
};
scr.onerror=function(){
  document.getElementById('loadingScreen').innerHTML=
    '<p style="color:#f44336;padding:40px">Failed to load OpenCV.js<br>Check internet</p>';
};
document.head.appendChild(scr);
</script>
